<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>индульгенция</title>
    <style>
        /* Запрещаем выделение и сохранение картинок */
        * {
            -webkit-touch-callout: none; /* Запрет на сохранение в Safari */
            -webkit-user-select: none;   /* Chrome/Safari */
            -khtml-user-select: none;    /* Konqueror */
            -moz-user-select: none;      /* Firefox */
            -ms-user-select: none;       /* Internet Explorer/Edge */
            user-select: none;            /* Non-prefixed version */
            -webkit-tap-highlight-color: transparent; /* Убираем серый фон при тапе на мобильных */
        }

        /* Разрешаем выделение только для текстовых полей (на всякий случай) */
        input, textarea {
            -webkit-user-select: text;
            -khtml-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
        }

        /* Главный контейнер */
        .site {
            min-height: 100vh;
            background-color: #0a0a0a;
            display: flex;
            flex-direction: column;
        }

        /* Верхняя часть с гирляндами */
        .garland-section {
            height: 30vh;
            min-height: 200px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice"><rect width="100" height="100" fill="%230a0a0a"/><circle cx="15" cy="20" r="3" fill="%23ffd966" opacity="0.9"/><circle cx="30" cy="25" r="3.5" fill="%23ffb347" opacity="0.8"/><circle cx="48" cy="18" r="2.8" fill="%23ff6961" opacity="0.9"/><circle cx="65" cy="28" r="3.2" fill="%23ffd966" opacity="0.8"/><circle cx="82" cy="22" r="3" fill="%23ffb347" opacity="0.9"/><circle cx="8" cy="40" r="2.5" fill="%23ffd966" opacity="0.7"/><circle cx="25" cy="35" r="3" fill="%23ff6961" opacity="0.8"/><circle cx="42" cy="45" r="3.8" fill="%23ffb347" opacity="0.9"/><circle cx="60" cy="38" r="2.8" fill="%23ffd966" opacity="0.8"/><circle cx="78" cy="48" r="3" fill="%23ff6961" opacity="0.7"/><circle cx="92" cy="32" r="3.5" fill="%23ffb347" opacity="0.8"/></svg>');
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            position: relative;
            pointer-events: none; /* Чтобы картинка не реагировала на клики */
        }

        /* Затемнение на гирлянды, чтобы текст не терялся */
        .garland-section::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(10,10,10,0.3) 0%, rgba(10,10,10,0.8) 90%);
            pointer-events: none;
        }

        /* Основная часть с контентом */
        .content {
            flex: 1;
            background-color: #0a0a0a;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 16px 40px;
            box-sizing: border-box;
        }

        /* Используем дерево как текстуру фона для блока с текстом */
        .text-block {
            width: 100%;
            max-width: 500px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.15"><rect width="100" height="100" fill="%233d2b1a"/><path d="M10 30 Q 30 20 50 30 T 90 25" stroke="%238b5a2b" fill="none" stroke-width="1.5" opacity="0.4"/><path d="M20 70 Q 40 60 60 70 T 85 65" stroke="%238b5a2b" fill="none" stroke-width="1.5" opacity="0.4"/><circle cx="40" cy="50" r="2" fill="%23a0522d" opacity="0.3"/><circle cx="70" cy="55" r="2.5" fill="%23a0522d" opacity="0.3"/></svg>');
            background-size: 300px;
            background-position: center;
            border-radius: 24px 24px 12px 12px;
            padding: 30px 20px;
            box-sizing: border-box;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,215,0,0.1);
            border-top: 1px solid rgba(255,200,100,0.2);
            margin-bottom: 20px;
        }

        /* Элемент с дымом — фоновая картинка в углу */
        .smoke-overlay {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 200px;
            height: 200px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.15"><path d="M150 100 Q 170 70 180 90 Q 190 110 170 130 Q 150 150 130 130 Q 120 110 140 90 Q 150 80 150 100" fill="%23cccccc" opacity="0.3"/><path d="M100 150 Q 120 130 130 150 Q 140 170 110 180 Q 80 190 70 160 Q 60 140 80 130 Q 100 120 100 150" fill="%23aaaaaa" opacity="0.2"/><path d="M40 160 Q 60 140 80 150 Q 100 160 80 180 Q 60 200 40 180 Q 30 170 40 160" fill="%23888888" opacity="0.2"/></svg>');
            background-repeat: no-repeat;
            background-position: bottom right;
            background-size: contain;
            pointer-events: none;
            z-index: 0;
        }

        /* Элемент со свечой — маленькая иконка */
        .candle-icon {
            display: inline-block;
            width: 20px;
            height: 28px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 28"><rect x="7" y="10" width="6" height="14" fill="%23f5e6d3" rx="1"/><circle cx="10" cy="8" r="3" fill="%23ffa500" opacity="0.9"/><ellipse cx="10" cy="6" rx="2" ry="3" fill="%23ffcc00" opacity="0.7"/><rect x="8" y="24" width="4" height="3" fill="%238b5a2b"/></svg>');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-right: 6px;
            vertical-align: middle;
            pointer-events: none;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 400;
            margin: 0 0 10px 0;
            letter-spacing: 1px;
            color: #f0e6d2;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .subhead {
            font-size: 1rem;
            text-align: center;
            color: #b0a8a0;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            padding-bottom: 15px;
            line-height: 1.5;
        }

        .price-question {
            font-size: 1.2rem;
            text-align: center;
            margin: 20px 0 10px;
            color: #d4c8bc;
        }

        .input-wrapper {
            width: 100%;
            margin: 15px 0;
        }

        input {
            width: 100%;
            padding: 18px 16px;
            font-size: 1.8rem;
            text-align: center;
            background: rgba(20,15,10,0.7);
            border: 1px solid #b8860b;
            border-radius: 40px;
            color: #ffd966;
            font-weight: 300;
            outline: none;
            box-sizing: border-box;
            backdrop-filter: blur(2px);
            box-shadow: 0 0 15px rgba(255,200,0,0.1);
        }

        input:focus {
            border-color: #ffaa00;
            background: rgba(10,8,5,0.8);
            box-shadow: 0 0 25px rgba(255,180,0,0.3);
        }

        .hint {
            font-size: 0.85rem;
            color: #7a6a5a;
            text-align: right;
            margin-top: 6px;
            padding-right: 10px;
        }

        .pay-button {
            background: rgba(30,25,20,0.9);
            color: #ffd700;
            border: 1px solid #b2975a;
            border-radius: 60px;
            padding: 18px 30px;
            font-size: 1.5rem;
            font-weight: 400;
            width: 100%;
            margin: 20px 0 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.7);
            transition: all 0.2s;
            letter-spacing: 1.5px;
            backdrop-filter: blur(4px);
        }

        .pay-button:active {
            background: #3a2e22;
            transform: scale(0.98);
            border-color: #ffcc00;
            box-shadow: 0 0 30px #ffaa00;
        }

        .result-message {
            background: rgba(0,0,0,0.6);
            border-left: 3px solid #b8860b;
            padding: 20px 18px;
            margin: 20px 0;
            font-size: 1rem;
            line-height: 1.6;
            color: #d6c9bd;
            border-radius: 8px;
            backdrop-filter: blur(2px);
            white-space: pre-line;
        }

        .footer-links {
            display: flex;
            gap: 20px;
            margin-top: 25px;
            font-size: 0.9rem;
            color: #5a4a3a;
        }

        .footer-links span {
            cursor: default;
            border-bottom: 1px dotted #5a4a3a;
        }

        /* Запрещаем реакции на картинки */
        .no-click {
            pointer-events: none;
            user-drag: none;
            -webkit-user-drag: none;
        }

        /* Стили для сообщения после оплаты (скрыто по умолчанию) */
        .hidden {
            display: none;
        }

        .center {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="site">
        <!-- Верхняя часть с гирляндами (только визуал) -->
        <div class="garland-section no-click"></div>

        <!-- Основной контент -->
        <div class="content">
            <!-- Блок с текстурой дерева -->
            <div class="text-block">
                <h1>
                    <span class="candle-icon no-click"></span>
                    индульгенция
                </h1>
                <div class="subhead">
                    отпущение грехов для атеистов
                </div>

                <!-- Платежная форма -->
                <div class="price-question">сколько весит твой грех?</div>
                <div class="input-wrapper">
                    <input type="number" id="sinAmount" placeholder="₽" min="1" value="">
                </div>
                <div class="hint">
                    цена которую не жалко? вот и кайф
                </div>

                <button class="pay-button" id="payButton">
                    🔥 заплатить и сгореть
                </button>

                <!-- Блок с результатом (изначально скрыт) -->
                <div id="resultBlock" class="result-message hidden">
                    <div style="text-align: center; margin-bottom: 15px;">✷  ГРЕХ ОПЛАЧЕН  ✷</div>
                    <div id="amountMessage"></div>
                    <div style="margin: 15px 0; border-top: 1px dashed #b8860b;"></div>
                    <div>
                        Деньги ушли. Чувствуешь пустоту? Это не развод, это цена. 
                        Теперь либо дальше гнить, либо делать. 
                        Обратного пути нет, бабки не вернешь.
                    </div>
                </div>

                <!-- Маленький огонек свечи внизу блока -->
                <div style="display: flex; justify-content: center; margin-top: 15px;">
                    <span class="candle-icon no-click"></span>
                </div>
            </div>

            <!-- Простые ссылки внизу -->
            <div class="footer-links">
                <span>как работает</span>
                <span>другие грешники</span>
                <span>батюшка</span>
            </div>
        </div>

        <!-- Декоративный дым в углу (не мешает кликам) -->
        <div class="smoke-overlay no-click"></div>
    </div>

    <script>
        // Простейшая логика: показываем сообщение после "оплаты"
        const payButton = document.getElementById('payButton');
        const resultBlock = document.getElementById('resultBlock');
        const amountInput = document.getElementById('sinAmount');
        const amountMessage = document.getElementById('amountMessage');

        payButton.addEventListener('click', function() {
            let amount = amountInput.value.trim();
            
            // Если ничего не ввели или ноль, ставим заглушку
            if (amount === '' || parseFloat(amount) <= 0) {
                amount = 'стыд';
            } else {
                amount = amount + ' ₽';
            }

            // Вставляем сумму в сообщение
            amountMessage.textContent = `Ты заплатил ${amount}. И что?`;

            // Показываем блок с результатом
            resultBlock.classList.remove('hidden');

            // Плавно скроллим к результату
            resultBlock.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });

        // Дополнительно: запрещаем контекстное меню на всей странице (сохранить как)
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });

        // Запрещаем перетаскивание изображений (на всякий случай)
        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
            return false;
        });
    </script>
</body>
</html>
