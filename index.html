<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>идите в жопу</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background-color: black;
        }
        
        /* Картинка на весь экран */
        .full-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://s10.iimage.su/s/09/gbIXZYUxzrCoJ7TVQuus0lIHgRmlU0HZIdIpvN8SL.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }
        
        /* Текст поверх */
        .message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            color: white;
            font-size: clamp(2rem, 10vw, 5rem);
            font-weight: 800;
            text-shadow: 4px 4px 12px black;
            z-index: 2;
            background-color: rgba(0,0,0,0.2);
            padding: 12px 30px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.2);
            letter-spacing: 3px;
            text-transform: lowercase;
            line-height: 1;
        }
        
        /* Защита от сохранения */
        body {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="full-image"></div>
    <div class="message">идите в жопу</div>

    <script>
        // Запрет контекстного меню (сохранить как)
        document.addEventListener('contextmenu', event => event.preventDefault());
        // Запрет перетаскивания
        document.addEventListener('dragstart', event => event.preventDefault());
    </script>
</body>
</html>
